name: BDD Regression Suite

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: kashmiri_dry_fruits_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools<82"
          python -m pip install -r backend/requirements.txt
          python -m pip install behave playwright pytest requests

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Initialize Test Database
        env:
          DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/kashmiri_dry_fruits_test
        run: |
          python backend/scripts/init_db.py
          python backend/scripts/update_db_schema.py
          python backend/scripts/register_root.py
          python backend/scripts/seed_themed_data.py

      - name: Start Services (Backend & Frontend)
        env:
          DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/kashmiri_dry_fruits_test
          FLASK_CONFIG: dev
          SECRET_KEY: test-secret-key
          VITE_API_URL: http://localhost:5000
          ENABLE_MOCK_PAYMENT: true
        run: |
          cd backend
          python app.py &
          cd ../frontend
          # Use CI=true to prevent Vite from interactive prompts
          CI=true npm run dev -- --port 3000 &
          sleep 20 # Give services extra time to warm up in CI

      - name: Run Full BDD Regression Suite
        env:
          HEADLESS: "true"
          BASE_URL: http://localhost:3000
          ENABLE_MOCK_PAYMENT: "true"
        run: |
          # Run all tests except those requiring real provider interaction
          behave tests/features --tags=~@provider-verify
