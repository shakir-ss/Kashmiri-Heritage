name: BDD Regression Suite

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: kashmiri_dry_fruits_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools
          python -m pip install -r backend/requirements.txt
          python -m pip install behave playwright pytest

      - name: Debug installed packages
        run: python -m pip list

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Initialize Test Database
        env:
          DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/kashmiri_dry_fruits_test
        run: |
          python backend/scripts/update_db_schema.py
          python backend/scripts/register_root.py

      - name: Run Backend in Background
        env:
          DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/kashmiri_dry_fruits_test
          FLASK_CONFIG: dev
          JWT_SECRET_KEY: test-secret-key
        run: |
          cd backend
          python app.py &
          sleep 5 # Wait for server to start

      - name: Run BDD Tests
        env:
          BASE_URL: http://127.0.0.1:5000
        run: |
          # We use the local backend started above
          ./backend/venv/bin/behave tests/features || behave tests/features
